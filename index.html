<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discipline App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

input {
  padding: 10px;
  margin-top: 20px;
  width: 70%;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
}

.card {
  background: #1c1c1c;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Мои задачи</h2>

<input id="taskInput" placeholder="Введите задачу">
<br>
<button onclick="addTask()">Добавить</button>

<div id="tasks"></div>

<p id="xp">XP: 0</p>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let xp = Number(localStorage.getItem("xp")) || 0;

let today = "test3" 
let savedDay = localStorage.getItem("day");

    if(savedDay !== today){
tasks = tasks.filter(task => task.daily === true);

  tasks.forEach(task => {
    task.done = false;
  });

  localStorage.setItem("day", today);
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("xp", xp);
}

function addTask(){
  let input = document.getElementById("taskInput");
  if(!input.value) return;

  tasks.push({
    title: input.value,
    done: false,
    daily: false
  });

  input.value = "";
  save();
  render();
}

function toggleDone(index){
  if(tasks[index].done) return;

  tasks[index].done = true;
  xp += 10;

  save();
  render();
}

function toggleDaily(index){
  tasks[index].daily = !tasks[index].daily;
  save();
  render();
}

function deleteTask(index){
  tasks.splice(index, 1);
  save();
  render();
}

function render(){
  let container = document.getElementById("tasks");
  container.innerHTML = "";

  tasks.forEach((task, i) => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <p>${task.title}</p>
      <button onclick="toggleDone(${i})">${task.done ? "✔" : "Сделать"}</button>
      <button onclick="toggleDaily(${i})">${task.daily ? "★" : "☆"}</button>
      <button onclick="deleteTask(${i})">❌</button>
    `;

    container.appendChild(div);
  });

  document.getElementById("xp").innerText = "XP: " + xp;
}

render();
</script>

</body>
</html>
